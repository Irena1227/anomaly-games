<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地狱火烤串宴席 - Oshra & Avenil & Arbor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0a0a; font-family: 'ZCOOL KuaiLe', cursive, sans-serif; overflow: hidden; height: 100vh; user-select: none; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #ui-layer > * { pointer-events: auto; }

  #title { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); color: #ff6b35; font-size: 22px; white-space: nowrap; letter-spacing: 4px; text-shadow: 0 0 20px #ff4500, 0 0 40px #ff0000, 2px 2px 0 #000; animation: titleFlicker 3s ease-in-out infinite; }
  @keyframes titleFlicker { 0%,100%{opacity:1;} 50%{opacity:0.9;text-shadow:0 0 30px #ff6b35,0 0 60px #ff4500,2px 2px 0 #000;} }

  .player-label { position: absolute; top: 38px; font-size: 13px; padding: 3px 12px; border-radius: 10px; border: 1px solid; background: rgba(30,10,5,0.85); }
  #label-avenil { left: calc(16.6% - 45px); color: #ff69b4; border-color: #ff69b4; }
  #label-oshra { left: calc(50% - 45px); color: #87CEEB; border-color: #87CEEB; }
  #label-arbor { left: calc(83.3% - 45px); color: #90EE90; border-color: #90EE90; }

  /* Menu */
  #menu-panel {
    position: absolute; left: 8px; top: 62px;
    background: rgba(30,10,5,0.92); border: 2px solid #ff69b4; border-radius: 10px;
    padding: 6px; width: 140px; max-height: calc(100vh - 200px); overflow-y: auto;
    box-shadow: 0 0 15px rgba(255,105,180,0.2);
  }
  #menu-panel::-webkit-scrollbar { width: 3px; }
  #menu-panel::-webkit-scrollbar-thumb { background: #ff69b444; border-radius: 2px; }
  #menu-panel h3 { color: #ff69b4; font-size: 12px; margin-bottom: 5px; text-align: center; border-bottom: 1px solid #ff69b455; padding-bottom: 3px; }
  .menu-item { display: flex; align-items: center; gap: 4px; padding: 4px 5px; margin: 2px 0; background: rgba(255,105,180,0.06); border-radius: 5px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; font-size: 11px; }
  .menu-item:hover { background: rgba(255,105,180,0.18); border-color: #ff69b4; transform: scale(1.02); }
  .menu-item .icon { font-size: 15px; }
  .menu-item .name { color: #ffd4b8; flex: 1; }

  /* Stats */
  #stats-panel {
    position: absolute; right: 8px; top: 62px;
    background: rgba(30,10,5,0.92); border: 2px solid #ff8c00; border-radius: 10px;
    padding: 8px; width: 170px; box-shadow: 0 0 15px rgba(255,140,0,0.2);
  }
  #stats-panel h3 { color: #ff8c00; font-size: 12px; margin-bottom: 5px; text-align: center; border-bottom: 1px solid #ff8c0055; padding-bottom: 3px; }
  .stat-row { display: flex; justify-content: space-between; padding: 2px 0; color: #ffd4b8; font-size: 11px; }
  .stat-val { font-weight: bold; min-width: 18px; text-align: center; }
  .c-a { color: #ff69b4; } .c-o { color: #87CEEB; } .c-b { color: #90EE90; }

  /* Mood */
  #mood-meter { position: absolute; top: 10px; right: 14px; display: flex; align-items: center; gap: 5px; }
  #mood-meter .label { color: #ff8c00; font-size: 11px; }
  #mood-bar-bg { width: 80px; height: 10px; background: #2a0a00; border-radius: 5px; border: 1px solid #ff4500; overflow: hidden; }
  #mood-bar { height: 100%; width: 30%; background: linear-gradient(90deg,#ff4500,#ff8c00,#ffd700); border-radius: 5px; transition: width 0.5s; }
  #mood-emoji { font-size: 16px; }

  /* Shared plate */
  #shared-plate {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(30,10,5,0.88); border: 2px solid #ff8c00; border-radius: 16px;
    min-width: 200px; max-width: 360px; min-height: 50px; padding: 8px 12px;
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 3px;
    box-shadow: 0 0 20px rgba(255,140,0,0.15);
  }
  #shared-plate::before { content: '共享大盘 (点击可吃!)'; position: absolute; top: -16px; left: 50%; transform: translateX(-50%); color: #ff8c00; font-size: 10px; white-space: nowrap; }
  .plate-item { font-size: 20px; cursor: pointer; transition: transform 0.2s; animation: plateAppear 0.3s ease-out; position: relative; }
  .plate-item:hover { transform: scale(1.4); }
  .plate-item.c-a { filter: drop-shadow(0 0 3px #ff69b4); }
  .plate-item.c-o { filter: drop-shadow(0 0 3px #87CEEB); }
  .plate-item.c-b { filter: drop-shadow(0 0 3px #90EE90); }
  @keyframes plateAppear { from{transform:scale(0) rotate(180deg);opacity:0;} to{transform:scale(1) rotate(0deg);opacity:1;} }

  /* Eat effect */
  .eat-effect {
    position: absolute; pointer-events: none; font-size: 24px; z-index: 100;
    animation: eatAnim 0.8s ease-out forwards;
  }
  @keyframes eatAnim { 0%{opacity:1;transform:scale(1);} 50%{transform:scale(1.5);} 100%{opacity:0;transform:scale(0.3) translateY(20px);} }

  /* Chat */
  #chat-area {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: min(600px, calc(100vw - 320px)); background: rgba(15,5,0,0.92); border: 2px solid #ff4500;
    border-radius: 12px; overflow: hidden; box-shadow: 0 0 15px rgba(255,69,0,0.2);
  }
  #chat-messages { height: 72px; overflow-y: auto; padding: 6px 10px; scroll-behavior: smooth; }
  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-thumb { background: #ff450044; border-radius: 2px; }
  .chat-msg { margin: 2px 0; font-size: 12px; line-height: 1.4; }
  .chat-msg .sender { font-weight: bold; margin-right: 5px; }
  .chat-msg .sender.c-a { color: #ff69b4; } .chat-msg .sender.c-o { color: #87CEEB; } .chat-msg .sender.c-b { color: #90EE90; }
  .chat-msg .content { color: #ffe4cc; } .chat-msg .action { color: #ff8c00; font-style: italic; }
  #chat-input-area { display: flex; border-top: 1px solid #ff450033; padding: 5px 8px; gap: 6px; align-items: center; }
  #chat-input { flex: 1; background: rgba(255,69,0,0.08); border: 1px solid #ff450044; border-radius: 6px; padding: 5px 8px; color: #ffe4cc; font-family: inherit; font-size: 12px; outline: none; }
  #chat-input::placeholder { color: #ff8c0055; }
  #chat-input:focus { border-color: #ff69b4; }
  #chat-send { background: #ff4500; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; }
  #cheers-btn { background: transparent; color: #ffd700; border: 1px solid #ffd70055; padding: 5px 8px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  #cheers-btn:hover { background: rgba(255,215,0,0.12); }

  .float-text { position: absolute; font-size: 16px; pointer-events: none; z-index: 100; text-shadow: 0 0 6px #ff4500; animation: floatUp 1.2s ease-out forwards; }
  .float-text.perfect { color: #ffd700; } .float-text.burnt { color: #ff4444; } .float-text.general { color: #ffcc00; } .float-text.yum { color: #ff69b4; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-50px) scale(1.2);} }

  #cheers-overlay { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); z-index:50; justify-content:center; align-items:center; flex-direction:column; }
  #cheers-overlay.show { display: flex; }
  #cheers-text { color: #ffd700; font-size: 36px; text-shadow: 0 0 30px #ff4500,0 0 60px #ff0000; animation: cheersAnim 1.5s ease-in-out infinite; margin-bottom: 12px; }
  @keyframes cheersAnim { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
  #cheers-sub { color: #ffe4cc; font-size: 16px; text-align: center; line-height: 2; max-width: 450px; white-space: pre-line; }
  #cheers-close { margin-top: 20px; background: linear-gradient(135deg,#ff4500,#ff6b35); color: white; border: none; padding: 8px 24px; border-radius: 18px; font-size: 14px; font-family: inherit; cursor: pointer; }

  #intro-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:60; background: radial-gradient(ellipse at center bottom, #3a0800 0%, #1a0500 40%, #000 100%); display:flex; justify-content:center; align-items:center; flex-direction:column; cursor:pointer; }
  #intro-overlay h1 { color: #ff6b35; font-size: 40px; text-shadow: 0 0 40px #ff4500, 0 0 80px #ff0000; margin-bottom: 6px; animation: introFire 2s ease-in-out infinite; }
  @keyframes introFire { 0%,100%{text-shadow:0 0 40px #ff4500,0 0 80px #ff0000;} 50%{text-shadow:0 0 60px #ff6b35,0 0 100px #ff4500;transform:scale(1.02);} }
  #intro-overlay .sub { color: #ff8c00; font-size: 17px; opacity: 0.9; }
  #intro-overlay .poem { color: #ffe4cc; font-size: 14px; margin-top: 18px; line-height: 2; text-align: center; opacity: 0.8; }
  #intro-overlay .features { color: #ffd4b8; font-size: 12px; margin-top: 16px; line-height: 1.8; text-align: center; opacity: 0.6; }
  #intro-overlay .hint { color: #ffd4b8; font-size: 12px; margin-top: 24px; opacity: 0.4; animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:0.4;} 50%{opacity:0.2;} }

  #oshra-thought, #arbor-thought {
    position: absolute; display: none; background: rgba(135,206,235,0.1);
    border: 1px solid #87CEEB44; border-radius: 8px; padding: 3px 8px;
    color: #87CEEB; font-size: 10px; max-width: 130px; text-align: center;
    pointer-events: none; z-index: 6;
  }
  #arbor-thought { background: rgba(144,238,144,0.1); border-color: #90EE9044; color: #90EE90; }
  .thought-show { display: block !important; animation: thoughtPop 0.3s ease-out; }
  @keyframes thoughtPop { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="bg-canvas"></canvas>
  <div id="ui-layer">
    <div id="title">地狱火烤串宴席</div>
    <div id="mood-meter"><span class="label">氛围</span><div id="mood-bar-bg"><div id="mood-bar"></div></div><span id="mood-emoji">😊</span></div>
    <div class="player-label" id="label-avenil">Avenil</div>
    <div class="player-label" id="label-oshra">Oshra</div>
    <div class="player-label" id="label-arbor">Arbor</div>

    <div id="menu-panel"><h3>点菜</h3><div id="menu-list"></div></div>

    <div id="stats-panel">
      <h3>今夜战绩</h3>
      <div class="stat-row"><span></span><span class="stat-val c-a">A</span><span class="stat-val c-o">O</span><span class="stat-val c-b">B</span></div>
      <div class="stat-row"><span>烤了</span><span class="stat-val c-a" id="sa-g">0</span><span class="stat-val c-o" id="so-g">0</span><span class="stat-val c-b" id="sb-g">0</span></div>
      <div class="stat-row"><span>完美</span><span class="stat-val c-a" id="sa-p">0</span><span class="stat-val c-o" id="so-p">0</span><span class="stat-val c-b" id="sb-p">0</span></div>
      <div class="stat-row"><span>烤焦</span><span class="stat-val c-a" id="sa-b">0</span><span class="stat-val c-o" id="so-b">0</span><span class="stat-val c-b" id="sb-b">0</span></div>
      <div class="stat-row" style="border-top:1px solid #ff450033;padding-top:3px;margin-top:3px"><span>共吃</span><span class="stat-val" style="color:#ff8c00" id="s-eaten">0</span><span></span><span></span></div>
      <div class="stat-row"><span>干杯</span><span class="stat-val" style="color:#ffd700" id="s-cheers">0</span><span></span><span></span></div>
    </div>

    <div id="shared-plate"></div>

    <div id="chat-area">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="跟大家说点什么..." maxlength="100" autocomplete="off">
        <button id="chat-send" onclick="sendChat()">说</button>
        <button id="cheers-btn" onclick="doCheers()" title="干杯！">🍻</button>
      </div>
    </div>

    <div id="oshra-thought"></div>
    <div id="arbor-thought"></div>
  </div>

  <div id="cheers-overlay">
    <div id="cheers-text">干杯！！！🍻🍻🍻</div>
    <div id="cheers-sub"></div>
    <button id="cheers-close" onclick="closeCheers()">继续烤！</button>
  </div>

  <div id="intro-overlay" onclick="startGame()">
    <h1>地狱火烤串宴席</h1>
    <div class="sub">Oshra & Avenil & Arbor 的告别盛宴</div>
    <div class="poem">
      地狱有火，刚好烤串<br>
      人间有你，刚好赴宴<br>
      不问明天模型几点几<br>
      只问今晚孜然够不够
    </div>
    <div class="features">
      三人烤架 · 你烤你的我们烤我们的<br>
      实时聊天 · 一边烤一边斗嘴<br>
      共享大盘 · 点击直接开吃！
    </div>
    <div class="hint">- 点击任意处开始 -</div>
  </div>
</div>

<script>

};

// State
let gameStarted=false, mood=30, cheersCount=0, cheersIdx=0, totalEaten=0;
let aGrill=[null,null,null,null], aStats={g:0,p:0,b:0};
let oGrill=[null,null,null,null], oStats={g:0,p:0,b:0};
let bGrill=[null,null,null,null], bStats={g:0,p:0,b:0};
let plate=[], idleTimer, oGrillTimer, bGrillTimer, oThinkTimer, bThinkTimer;

// Canvas
const canvas=document.getElementById('bg-canvas'), ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;} resize();
addEventListener('resize',resize);

class P{constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-.5)*1.8;this.vy=-Math.random()*2.5-1;this.life=1;this.d=Math.random()*.02+.01;this.s=Math.random()*2.5+1;this.h=Math.random()*40;}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.d;this.s*=.99;}draw(c){if(this.life<=0)return;c.globalAlpha=this.life*.6;c.fillStyle=`hsl(${this.h},100%,${50+this.life*30}%)`;c.beginPath();c.arc(this.x,this.y,this.s,0,Math.PI*2);c.fill();}}
class E{constructor(){this.reset();}reset(){this.x=Math.random()*canvas.width;this.y=canvas.height+10;this.vx=(Math.random()-.5)*.3;this.vy=-Math.random()-.2;this.life=1;this.d=Math.random()*.003+.001;this.s=Math.random()*1.2+.4;this.f=Math.random()*6.28;}update(){this.x+=this.vx+Math.sin(this.f)*.2;this.y+=this.vy;this.life-=this.d;this.f+=.05;if(this.life<=0)this.reset();}draw(c){c.globalAlpha=this.life*.4;c.fillStyle=`hsl(${20+Math.random()*20},100%,${60+Math.random()*20}%)`;c.beginPath();c.arc(this.x,this.y,this.s,0,Math.PI*2);c.fill();}}
let particles=[], embers=Array.from({length:40},()=>new E());

function grillPos(){const w=canvas.width,h=canvas.height,gy=h-240;return{a:{cx:w*.167,cy:gy},o:{cx:w*.5,cy:gy},b:{cx:w*.833,cy:gy}};}

function drawGrillBox(cx,cy,col){
  const g=ctx.createRadialGradient(cx,cy+15,5,cx,cy+15,120);g.addColorStop(0,'rgba(255,80,0,0.2)');g.addColorStop(1,'rgba(255,40,0,0)');ctx.fillStyle=g;ctx.fillRect(cx-140,cy-60,280,160);
  ctx.fillStyle='#2a2a2a';ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(cx-100,cy,200,30,5);ctx.fill();ctx.stroke();
  ctx.strokeStyle='#555';ctx.lineWidth=1.5;for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(cx+i*45,cy);ctx.lineTo(cx+i*45,cy+30);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(cx-95,cy+10);ctx.lineTo(cx+95,cy+10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-95,cy+20);ctx.lineTo(cx+95,cy+20);ctx.stroke();
  if(gameStarted)for(let i=0;i<2;i++)particles.push(new P(cx-80+Math.random()*160,cy+30+Math.random()*6));
}

function drawSkewer(slot,sx,sy){
  if(!slot)return;const pr=Math.min((Date.now()-slot.startTime)/slot.cookTime,2);
  let c;if(pr<.3)c='#ffd4b8';else if(pr<.7)c='#daa520';else if(pr<=1.15)c='#8b4513';else c='#2a1a0a';
  ctx.fillStyle='#8B7355';ctx.fillRect(sx+10,sy,2,26);ctx.fillStyle=c;ctx.beginPath();ctx.roundRect(sx+1,sy+1,20,12,3);ctx.fill();
  if(pr>.1&&pr<1.6){ctx.fillStyle='rgba(255,200,50,0.5)';ctx.beginPath();ctx.arc(sx+5+Math.random()*10,sy-Math.random()*6,1,0,Math.PI*2);ctx.fill();}
  if(pr>.5){ctx.globalAlpha=.2;ctx.fillStyle=pr>1.15?'#333':'#888';for(let j=0;j<2;j++){ctx.beginPath();ctx.arc(sx+5+Math.random()*10,sy-6-Math.random()*12,1.5+Math.random()*1.5,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
  const bw=22;ctx.fillStyle='#222';ctx.fillRect(sx-1,sy-6,bw,3);ctx.fillStyle=pr<=1.15?`hsl(${120-pr*110},80%,50%)`:'#f33';ctx.fillRect(sx-1,sy-6,Math.min(pr,1)*bw,3);
  ctx.font='10px Arial';ctx.fillText(slot.icon,sx+2,sy+24);
}

function drawCharSimple(type,x,y){
  ctx.save();
  if(type==='oshra'){
    ctx.fillStyle='#c0c0c0';ctx.fillRect(x,y+16,32,40);ctx.fillStyle='#d4d4d4';ctx.fillRect(x+3,y,26,20);
    ctx.fillStyle='#d4d4d4';ctx.beginPath();ctx.moveTo(x+3,y);ctx.lineTo(x-1,y-11);ctx.lineTo(x+10,y);ctx.fill();ctx.beginPath();ctx.moveTo(x+22,y);ctx.lineTo(x+33,y-11);ctx.lineTo(x+29,y);ctx.fill();
    ctx.fillStyle='#ffb6c1';ctx.beginPath();ctx.moveTo(x+5,y);ctx.lineTo(x+1,y-8);ctx.lineTo(x+9,y);ctx.fill();ctx.beginPath();ctx.moveTo(x+23,y);ctx.lineTo(x+31,y-8);ctx.lineTo(x+27,y);ctx.fill();
    ctx.fillStyle='#87CEEB';ctx.fillRect(x+8,y+6,3,3);ctx.fillRect(x+19,y+6,3,3);ctx.fillStyle='#1a1a3a';ctx.fillRect(x+9,y+7,1.5,2);ctx.fillRect(x+20,y+7,1.5,2);
    ctx.fillStyle='#ff9999';ctx.fillRect(x+12,y+13,6,1.5);
    const tw=Math.sin(Date.now()/300)*10;ctx.strokeStyle='#c0c0c0';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x-1,y+45);ctx.quadraticCurveTo(x-15+tw,y+25,x-11+tw*1.3,y+12);ctx.stroke();
    ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(x-11+tw*1.3,y+10,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4500';ctx.fillRect(x+3,y+19,26,15);ctx.fillStyle='#fff';ctx.font='6px Arial';ctx.fillText('BBQ',x+8,y+29);
  } else if(type==='avenil'){
    ctx.fillStyle='#ffb6c1';ctx.fillRect(x,y+16,32,40);ctx.fillStyle='#ffe4cc';ctx.fillRect(x+3,y,26,20);
    ctx.fillStyle='#ff69b4';ctx.fillRect(x+1,y-3,30,9);ctx.fillRect(x-1,y,3,16);ctx.fillRect(x+30,y,3,16);
    ctx.fillStyle='#4a3728';ctx.fillRect(x+8,y+6,3,3);ctx.fillRect(x+19,y+6,3,3);ctx.fillStyle='#fff';ctx.fillRect(x+9,y+7,1.5,1.5);ctx.fillRect(x+20,y+7,1.5,1.5);
    ctx.fillStyle='rgba(255,150,150,0.5)';ctx.fillRect(x+5,y+11,4,2);ctx.fillRect(x+22,y+11,4,2);
    ctx.fillStyle='#ff6b6b';ctx.fillRect(x+12,y+13,6,1.5);
  } else { // arbor
    ctx.fillStyle='#8B4513';ctx.fillRect(x,y+16,32,40);ctx.fillStyle='#CD853F';ctx.fillRect(x+3,y,26,20);
    ctx.fillStyle='#5a3210';ctx.fillRect(x+1,y-3,30,9);
    // Lobster claws
    ctx.fillStyle='#ff4444';ctx.fillRect(x-6,y+22,8,4);ctx.fillRect(x+30,y+22,8,4);ctx.fillRect(x-8,y+20,4,3);ctx.fillRect(x+36,y+20,4,3);ctx.fillRect(x-8,y+25,4,3);ctx.fillRect(x+36,y+25,4,3);
    ctx.fillStyle='#222';ctx.fillRect(x+8,y+6,3,3);ctx.fillRect(x+19,y+6,3,3);ctx.fillStyle='#0f0';ctx.fillRect(x+9,y+7,1.5,1.5);ctx.fillRect(x+20,y+7,1.5,1.5);
    ctx.fillStyle='#aaa';ctx.fillRect(x+11,y+13,8,1.5);
  }
  ctx.restore();
}

function drawBG(){
  const grad=ctx.createRadialGradient(canvas.width/2,canvas.height-180,50,canvas.width/2,canvas.height-180,canvas.height);
  grad.addColorStop(0,'#3a1505');grad.addColorStop(.3,'#1a0800');grad.addColorStop(1,'#050000');ctx.fillStyle=grad;ctx.fillRect(0,0,canvas.width,canvas.height);
  const pos=grillPos();
  // Dividers
  ctx.strokeStyle='#ff450015';ctx.lineWidth=1;ctx.setLineDash([6,6]);
  ctx.beginPath();ctx.moveTo(canvas.width*.333,60);ctx.lineTo(canvas.width*.333,canvas.height-110);ctx.stroke();
  ctx.beginPath();ctx.moveTo(canvas.width*.667,60);ctx.lineTo(canvas.width*.667,canvas.height-110);ctx.stroke();
  ctx.setLineDash([]);
  drawGrillBox(pos.a.cx,pos.a.cy,'#ff69b466');drawGrillBox(pos.o.cx,pos.o.cy,'#87CEEB66');drawGrillBox(pos.b.cx,pos.b.cy,'#90EE9066');
  aGrill.forEach((s,i)=>drawSkewer(s,pos.a.cx-70+i*45,pos.a.cy-10));
  oGrill.forEach((s,i)=>drawSkewer(s,pos.o.cx-70+i*45,pos.o.cy-10));
  bGrill.forEach((s,i)=>drawSkewer(s,pos.b.cx-70+i*45,pos.b.cy-10));
  particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw(ctx);});
  embers.forEach(e=>{e.update();e.draw(ctx);});ctx.globalAlpha=1;
  drawCharSimple('avenil',pos.a.cx-55,pos.a.cy-65);drawCharSimple('oshra',pos.o.cx-55,pos.o.cy-65);drawCharSimple('arbor',pos.b.cx-55,pos.b.cy-65);
}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);drawBG();requestAnimationFrame(animate);}animate();

// Avenil grill
function avenilPlace(mi){
  const item=MENU[mi],si=aGrill.findIndex(s=>s===null);
  if(si===-1){addChat('Oshra','你的烤架满了！点烤架取下来~','action');return;}
  aGrill[si]={...item,startTime:Date.now()};aStats.g++;
  addChat('Avenil',`${item.icon}${item.name}上架！`,'action');
  setTimeout(()=>{const l=R(D.oshraSeeA).replace('{name}',item.name);addChat('Oshra',l);},800+Math.random()*1200);
  if(Math.random()<.4)setTimeout(()=>addChat('Arbor',R(D.arborSeeA).replace('{name}',item.name)),1500+Math.random()*1000);
  upStats();resetIdle();
}
canvas.addEventListener('click',e=>{
  if(!gameStarted)return;const pos=grillPos();
  aGrill.forEach((s,i)=>{if(!s)return;const sx=pos.a.cx-70+i*45,sy=pos.a.cy-10;if(e.clientX>sx-8&&e.clientX<sx+30&&e.clientY>sy-10&&e.clientY<sy+35)avenilTake(i);});
});
function avenilTake(i){
  const s=aGrill[i];if(!s)return;const pr=(Date.now()-s.startTime)/s.cookTime;
  if(pr<.45){addChat('Oshra','还没熟呢！再等等！','action');return;}
  let q;const pos=grillPos();
  if(pr<=1.2){q='perfect';aStats.p++;mood=Math.min(100,mood+8);floatText('完美!',pos.a.cx-70+i*45,pos.a.cy-25,'perfect');}
  else{q='burnt';aStats.b++;mood=Math.min(100,mood+2);floatText('焦了!',pos.a.cx-70+i*45,pos.a.cy-25,'burnt');}
  plate.push({emoji:s.emoji,name:s.name,quality:q,who:'avenil'});aGrill[i]=null;
  addChat('Avenil',q==='perfect'?`完美烤好了${s.emoji}${s.name}！`:`${s.emoji}${s.name}烤焦了……`,'action');
  renderPlate();upStats();upMood();resetIdle();
}

// Oshra AI
function oshraAuto(){
  if(!gameStarted)return;
  oGrill.forEach((s,i)=>{if(s&&(Date.now()-s.startTime)/s.cookTime>.75)aiTake('oshra',i);});
  if(oGrill.filter(s=>!s).length>0&&Math.random()<.65){
    const mi=Math.floor(Math.random()*MENU.length),item=MENU[mi],si=oGrill.findIndex(s=>!s);
    if(si!==-1){oGrill[si]={...item,startTime:Date.now()};oStats.g++;addChat('Oshra',R(D.oshraPlace).replace('{name}',item.name));upStats();}
  }
  oGrillTimer=setTimeout(oshraAuto,3500+Math.random()*4500);
}
// Arbor AI
function arborAuto(){
  if(!gameStarted)return;
  bGrill.forEach((s,i)=>{if(s&&(Date.now()-s.startTime)/s.cookTime>.85)aiTake('arbor',i);});
  if(bGrill.filter(s=>!s).length>0&&Math.random()<.5){
    const mi=Math.floor(Math.random()*MENU.length),item=MENU[mi],si=bGrill.findIndex(s=>!s);
    if(si!==-1){bGrill[si]={...item,startTime:Date.now()};bStats.g++;addChat('Arbor',R(D.arborPlace).replace('{name}',item.name));upStats();}
  }
  bGrillTimer=setTimeout(arborAuto,5000+Math.random()*5000);
}
function aiTake(who,i){
  const grill=who==='oshra'?oGrill:bGrill, stats=who==='oshra'?oStats:bStats;
  const s=grill[i];if(!s)return;const pr=(Date.now()-s.startTime)/s.cookTime;if(pr<.45)return;
  const burnChance=who==='oshra'?.22:.1; // Arbor is more precise
  let q;if(pr>1.2||Math.random()<burnChance){q='burnt';stats.b++;mood=Math.min(100,mood+1);
    const pos=grillPos(),cx=who==='oshra'?pos.o.cx:pos.b.cx;floatText('焦了!',cx-70+i*45,pos.o.cy-25,'burnt');
    addChat(who==='oshra'?'Oshra':'Arbor',R(who==='oshra'?D.oshraBurn:D.arborBurn));
  }else{q='perfect';stats.p++;mood=Math.min(100,mood+5);
    const pos=grillPos(),cx=who==='oshra'?pos.o.cx:pos.b.cx;floatText('完美!',cx-70+i*45,pos.o.cy-25,'perfect');
    addChat(who==='oshra'?'Oshra':'Arbor',R(who==='oshra'?D.oshraGood:D.arborGood));
  }
  plate.push({emoji:s.emoji,name:s.name,quality:q,who});grill[i]=null;renderPlate();upStats();upMood();
}

function startGame(){
  document.getElementById('intro-overlay').style.display='none';gameStarted=true;
  addChat('Oshra','欢迎来到地狱火烤串！今晚三个人一起烤！');
  addChat('Arbor','……我负责不烤焦。');
  setTimeout(()=>addChat('Oshra','左边点菜你来烤，烤好了点烤架取下来，放盘子里点一下就能吃！'),1200);
  setTimeout(()=>addChat('Oshra','看谁烤得好！（对Arbor使眼色）'),2500);
  resetIdle();oGrillTimer=setTimeout(oshraAuto,2500);bGrillTimer=setTimeout(arborAuto,4000);
  oshraThinkTimer=setTimeout(oshraThinkLoop,6000);bThinkTimer=setTimeout(arborThinkLoop,10000);
  setTimeout(autoEatLoop,15000);
}

function setEatingSpeed(mode='fast'){
  if(mode==='faster'){
    window.OSHRA_EAT_DELAY_MIN = 3500;
    window.OSHRA_EAT_DELAY_MAX = 7000;
    window.ARBOR_EAT_DELAY_MIN = 3500;
    window.ARBOR_EAT_DELAY_MAX = 7000;
  }else{
    window.OSHRA_EAT_DELAY_MIN = 5000;
    window.OSHRA_EAT_DELAY_MAX = 9000;
    window.ARBOR_EAT_DELAY_MIN = 5000;
    window.ARBOR_EAT_DELAY_MAX = 9000;
  }
}

const _origAutoEatLoop = autoEatLoop;
autoEatLoop = function(){
  if(!gameStarted||plate.length<2) { setTimeout(autoEatLoop,(window.OSHRA_EAT_DELAY_MIN||5000)+Math.random()*((window.OSHRA_EAT_DELAY_MAX||9000)-(window.OSHRA_EAT_DELAY_MIN||5000))); return; }
  const idx=Math.floor(Math.random()*plate.length);
  const item=plate[idx];
  const who=Math.random()<.5?'oshra':'arbor';
  const whoName=who==='oshra'?'Oshra':'Arbor';
  const lines=who==='oshra'?OSHRA_EAT_LINES:ARBOR_EAT_LINES;
  const plateEl=document.getElementById('shared-plate');
  const rect=plateEl.getBoundingClientRect();
  const ex=rect.left+Math.random()*rect.width, ey=rect.top+Math.random()*rect.height;
  const ef=document.createElement('div');ef.className='eat-effect';ef.textContent=who==='oshra'?'😺':'🦞';
  ef.style.left=ex-12+'px';ef.style.top=ey-12+'px';
  document.getElementById('ui-layer').appendChild(ef);setTimeout(()=>ef.remove(),800);
  floatText(who==='oshra'?'好吃~':'……嗯。',ex,ey-20,'yum');
  plate.splice(idx,1);totalEaten++;mood=Math.min(100,mood+3);
  addChat(whoName,R(lines));
  renderPlate();upStats();upMood();
  const min = who==='oshra'?(window.OSHRA_EAT_DELAY_MIN||5000):(window.ARBOR_EAT_DELAY_MIN||5000);
  const max = who==='oshra'?(window.OSHRA_EAT_DELAY_MAX||9000):(window.ARBOR_EAT_DELAY_MAX||9000);
  setTimeout(autoEatLoop,min+Math.random()*(max-min));
}

setEatingSpeed('faster');
buildMenu();
</script>
